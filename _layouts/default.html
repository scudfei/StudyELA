<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} · Alberta ELA</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f8fafc;
            color: #1e293b;
        }

        /* ── Top bar ─────────────────────────────────── */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: #1e293b;
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0 1.5rem;
            height: 52px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .topbar-back {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            text-decoration: none;
            color: #94a3b8;
            font-size: 0.875rem;
            font-weight: 500;
            white-space: nowrap;
            flex-shrink: 0;
            transition: color 0.15s;
        }
        .topbar-back:hover { color: #e2e8f0; }

        .topbar-sep {
            width: 1px;
            height: 1.25rem;
            background: rgba(255,255,255,0.15);
            flex-shrink: 0;
        }

        .topbar-title {
            color: #e2e8f0;
            font-size: 0.875rem;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ── Content area ────────────────────────────── */
        main {
            max-width: 820px;
            margin: 0 auto;
            padding: 3rem 2rem 5rem;
        }

        /* ── Rendered markdown ───────────────────────── */
        #content { line-height: 1.75; font-size: 1rem; }

        #content h1 {
            font-size: 1.875rem;
            font-weight: 700;
            color: #0f172a;
            line-height: 1.25;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        #content h2 {
            font-size: 1.35rem;
            font-weight: 600;
            color: #0f172a;
            margin-top: 2.5rem;
            margin-bottom: 0.875rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #e2e8f0;
        }

        #content h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e293b;
            margin-top: 1.75rem;
            margin-bottom: 0.6rem;
        }

        #content h4 {
            font-size: 0.95rem;
            font-weight: 600;
            color: #334155;
            margin-top: 1.25rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        #content p {
            color: #334155;
            margin-bottom: 0.875rem;
        }

        #content > p:first-of-type em,
        #content > p:nth-of-type(2) em {
            color: #94a3b8;
            font-size: 0.875rem;
        }

        #content hr {
            border: none;
            border-top: 1px solid #e2e8f0;
            margin: 2rem 0;
        }

        #content ul, #content ol {
            padding-left: 1.5rem;
            margin-bottom: 0.875rem;
        }

        #content li { color: #334155; margin-bottom: 0.25rem; }
        #content li > p { margin-bottom: 0.25rem; }

        #content blockquote {
            border-left: 4px solid #3B82F6;
            background: #f0f7ff;
            padding: 0.75rem 1.25rem;
            margin: 1rem 0;
            border-radius: 0 0.375rem 0.375rem 0;
        }

        #content blockquote p {
            color: #1e40af;
            margin-bottom: 0;
            font-style: italic;
            font-size: 0.95rem;
        }

        #content code {
            background: #f1f5f9;
            color: #0f172a;
            padding: 0.15em 0.4em;
            border-radius: 0.25rem;
            font-size: 0.875em;
            font-family: 'SF Mono', 'Fira Code', Consolas, 'Courier New', monospace;
        }

        #content pre {
            background: #1e293b;
            border-radius: 0.5rem;
            padding: 1.25rem;
            margin: 1rem 0;
            overflow-x: auto;
        }

        #content pre code {
            background: none;
            color: #e2e8f0;
            padding: 0;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        #content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            font-size: 0.9rem;
            border-radius: 0.5rem;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }

        #content th {
            background: #f1f5f9;
            text-align: left;
            padding: 0.65rem 1rem;
            font-weight: 600;
            color: #374151;
            font-size: 0.85rem;
            border-bottom: 1px solid #e2e8f0;
        }

        #content td {
            padding: 0.65rem 1rem;
            color: #475569;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: top;
        }

        #content tbody tr:last-child td { border-bottom: none; }
        #content tbody tr:hover td { background: #f8fafc; }

        #content strong { color: #0f172a; font-weight: 600; }

        #content a { color: #3B82F6; text-decoration: underline; }
        #content a:hover { color: #1d4ed8; }

        @media (max-width: 600px) {
            main { padding: 2rem 1.25rem 4rem; }
            #content h1 { font-size: 1.5rem; }
            #content h2 { font-size: 1.2rem; }
            #content table { font-size: 0.8rem; }
            #content th, #content td { padding: 0.5rem 0.6rem; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <a class="topbar-back" href="{{ site.baseurl }}/">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        All Resources
    </a>
    <div class="topbar-sep"></div>
    <span class="topbar-title">{{ page.title }}</span>
</div>

<main>
    <article id="content">
        {{ content }}
    </article>
</main>

</body>
</html>
